<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level B Vocabulary Unit 14 | Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Kalam:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0f172a;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-red: #ff003c;
            --neon-yellow: #faff00;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .neon-text-cyan { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); color: var(--neon-cyan); }
        .neon-text-magenta { text-shadow: 0 0 10px var(--neon-magenta); color: var(--neon-magenta); }
        .neon-text-lime { text-shadow: 0 0 10px var(--neon-lime); color: var(--neon-lime); }
        .neon-text-red { text-shadow: 0 0 10px var(--neon-red); color: var(--neon-red); }
        .neon-text-yellow { text-shadow: 0 0 8px var(--neon-yellow); color: var(--neon-yellow); }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .header-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .btn-retro {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 30px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .btn-retro:hover {
            background: var(--neon-cyan);
            color: var(--bg);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn-retro:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .handwriting {
            font-family: 'Kalam', cursive;
            font-size: 1.4rem;
        }

        /* MCQ Options */
        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
        }

        .option-card:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: translateX(10px);
        }

        .correct-flash { animation: flash-green 0.5s ease; border-color: var(--neon-lime) !important; background: rgba(57, 255, 20, 0.2) !important; }
        .wrong-flash { animation: flash-red 0.5s ease; border-color: var(--neon-red) !important; background: rgba(255, 0, 60, 0.2) !important; }

        @keyframes flash-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; background: var(--neon-lime); } }
        @keyframes flash-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; background: var(--neon-red); } }

        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 0%;
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <!-- UI Audio Elements -->
    <audio id="sfx-correct" src="correct.mp3"></audio>
    <audio id="sfx-wrong" src="wrong.mp3"></audio>
    <audio id="word-audio"></audio>

    <!-- Header -->
    <header class="p-6 flex justify-between items-center z-10">
        <div class="w-1/3"></div>
        <h1 class="w-1/3 text-center font-black text-2xl tracking-tighter orbitron header-glow italic">
            LEVEL B VOCABULARY <span class="neon-text-magenta">UNIT 14</span>
        </h1>
        <div class="w-1/3 text-right font-bold text-xs uppercase tracking-widest text-gray-400">
            Created by <span class="text-white">Amanullah Khan</span>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        
        <!-- Phase 1: Learning Gallery -->
        <div id="learning-screen" class="glass-card w-full max-w-4xl p-10 flex flex-col items-center gap-8">
            <div class="w-full flex justify-between items-center">
                <div class="text-4xl font-black text-white/20 italic">#<span id="word-idx">01</span></div>
                <div id="word-entry" class="text-center font-black orbitron uppercase tracking-widest" style="font-size: 20pt; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan);">AFFLICTION</div>
                <button onclick="playWordAudio()" class="hover:scale-110 transition text-white/50 hover:text-cyan-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                </button>
            </div>

            <div class="text-center space-y-6">
                <p style="font-size: 16pt;" class="text-white">
                    <span class="text-white/40 uppercase text-xs block mb-1 font-bold">Definition</span>
                    <span id="word-def">A physical ailment; a cause of suffering.</span>
                </p>

                <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                    <span class="text-white/40 uppercase text-xs block mb-2 font-bold">Example</span>
                    <p id="word-ex" class="handwriting neon-text-yellow"></p>
                </div>

                <div class="grid grid-cols-2 gap-8 pt-4">
                    <div>
                        <span class="text-white/40 uppercase text-xs block mb-1 font-bold">Synonyms</span>
                        <div id="word-syn" class="neon-text-lime text-xl font-bold">illness, woe</div>
                    </div>
                    <div>
                        <span class="text-white/40 uppercase text-xs block mb-1 font-bold">Antonyms</span>
                        <div id="word-ant" class="neon-text-red text-xl font-bold">blessing, joy</div>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-4">
                <button id="prev-btn" onclick="changeWord(-1)" class="btn-retro" style="border-color: var(--neon-magenta); color: var(--neon-magenta);">Back</button>
                <button id="next-btn" onclick="changeWord(1)" class="btn-retro">Next Word</button>
            </div>
        </div>

        <!-- Phase 2: Player Lobby -->
        <div id="lobby-screen" class="glass-card w-full max-w-md p-10 hidden flex flex-col items-center text-center">
            <h2 class="orbitron text-3xl font-black mb-2 neon-text-cyan">PRESS START</h2>
            <p class="text-white/60 mb-8 uppercase tracking-widest text-sm">Initialize Player Identity</p>
            
            <div class="w-full space-y-6">
                <div class="text-left">
                    <label class="text-xs uppercase font-bold text-gray-400 mb-2 block">Full Name</label>
                    <input type="text" id="user-name" class="w-full p-4 rounded-lg text-lg" placeholder="ENTER NAME...">
                </div>
                <div class="text-left">
                    <label class="text-xs uppercase font-bold text-gray-400 mb-2 block">Class ID</label>
                    <input type="text" id="user-class" class="w-full p-4 rounded-lg text-lg" placeholder="ENTER CLASS...">
                </div>
                <button onclick="initQuiz()" class="btn-retro w-full mt-4">Begin Mission</button>
            </div>
        </div>

        <!-- Phase 3: The Quiz -->
        <div id="quiz-screen" class="glass-card w-full max-w-3xl p-10 hidden flex flex-col items-center">
            <div class="w-full flex justify-between mb-8">
                <div class="orbitron text-xs text-cyan-400 font-bold tracking-widest">Question <span id="q-curr">1</span>/20</div>
                <div class="orbitron text-xs text-magenta-400 font-bold tracking-widest">Score: <span id="q-score">0</span></div>
            </div>

            <h2 id="q-text" class="text-2xl font-bold text-center mb-10 text-white min-h-[80px]"></h2>
            
            <div id="q-options" class="w-full grid grid-cols-1 gap-4">
                <!-- Options injected by JS -->
            </div>
        </div>

        <!-- Phase 4: Results -->
        <div id="results-screen" class="glass-card w-full max-w-2xl p-12 hidden flex flex-col items-center text-center">
            <div id="res-status" class="orbitron text-6xl font-black mb-4 italic">VICTORY</div>
            <div class="text-2xl font-bold mb-2 neon-text-cyan uppercase" id="res-user">Student Name</div>
            <div class="text-gray-400 font-bold mb-8 uppercase tracking-widest" id="res-class">Class 7A</div>

            <div class="w-full mb-8">
                <div class="flex justify-between font-bold mb-2 orbitron text-sm">
                    <span>Performance Rating</span>
                    <span id="res-percent">0%</span>
                </div>
                <div class="progress-container">
                    <div id="res-bar" class="progress-fill"></div>
                </div>
            </div>

            <p id="res-feedback" class="text-xl mb-10 text-white/80 italic"></p>

            <button onclick="location.reload()" id="retry-btn" class="btn-retro hidden">Re-Initialize</button>
        </div>

    </main>

    <script>
        const vocabulary = [
            { word: "affliction", def: "A physical ailment; a cause of suffering.", ex: "The rare *affliction* caused the patient constant pain.", syn: "illness, woe", ant: "blessing, joy" },
            { word: "akin", def: "Related by blood; having similar qualities.", ex: "The two languages are closely *akin* to each other.", syn: "related, similar", ant: "unrelated, different" },
            { word: "cosmopolitan", def: "Found in most parts of the world; sophisticated.", ex: "New York is a very *cosmopolitan* city with many cultures.", syn: "global, polished", ant: "narrow, provincial" },
            { word: "elongate", def: "To grow in length; to extend.", ex: "Stretching exercises help *elongate* your muscles.", syn: "lengthen, stretch", ant: "shorten, shrink" },
            { word: "gala", def: "A festive occasion or public entertainment.", ex: "The school held a *gala* to celebrate the anniversary.", syn: "extravaganza, festivity", ant: "uncelebrated event" },
            { word: "gaudy", def: "Flashy, showy; not in good taste.", ex: "The *gaudy* costume was covered in too many sequins.", syn: "flashy, loud", ant: "simple, modest" },
            { word: "gratitude", def: "Appreciation, thankfulness.", ex: "We expressed our *gratitude* with a thank-you note.", syn: "thanks, recognition", ant: "ingratitude" },
            { word: "heed", def: "To pay careful attention to.", ex: "You should *heed* the warnings of your parents.", syn: "listen, notice", ant: "ignore, disregard" },
            { word: "hoax", def: "An act intended to trick or deceive.", ex: "The alien sighting turned out to be a clever *hoax*.", syn: "deception, prank", ant: "truth, reality" },
            { word: "impartial", def: "Just, unbiased, fair; not taking sides.", ex: "A referee must remain *impartial* during the match.", syn: "neutral, objective", ant: "biased, unfair" },
            { word: "impostor", def: "A deceiver; one who uses a false name.", ex: "The *impostor* pretended to be a famous doctor.", syn: "fraud, phony", ant: "genuine person" },
            { word: "inflate", def: "To fill with air; to make appear larger.", ex: "It took ten minutes to *inflate* the giant balloon.", syn: "blow up, swell", ant: "deflate, flatten" },
            { word: "meager", def: "Poor, scant, unsatisfactory; thin.", ex: "The stray cat survived on a *meager* diet of scraps.", syn: "scanty, skimpy", ant: "plentiful, abundant" },
            { word: "meditate", def: "To think about deeply and quietly.", ex: "I like to *meditate* in the garden every morning.", syn: "ponder, reflect", ant: "ignore, disregard" },
            { word: "nutritious", def: "Nourishing, valuable as food.", ex: "Fresh vegetables are a *nutritious* part of any meal.", syn: "healthy, wholesome", ant: "unhealthy, junk" },
            { word: "oppress", def: "To govern cruelly; to weigh heavily upon.", ex: "The cruel king used his power to *oppress* the poor.", syn: "mistreat, burden", ant: "free, liberate" },
            { word: "pedestrian", def: "One who goes on foot; ordinary or dull.", ex: "The *pedestrian* crossed the street carefully.", syn: "walker, common", ant: "driver, exciting" },
            { word: "transmit", def: "To send on, pass along, or send out.", ex: "Satellites *transmit* signals around the world.", syn: "pass, send", ant: "receive, keep" },
            { word: "vanquish", def: "To defeat in battle; to overcome.", ex: "The knight vowed to *vanquish* the fire-breathing dragon.", syn: "conquer, beat", ant: "surrender, lose" },
            { word: "wan", def: "Unnaturally pale or sickly looking.", ex: "After staying up all night, her face looked *wan*.", syn: "pale, pasty", ant: "rosy, healthy" }
        ];

        let state = {
            currentIndex: 0,
            quizIndex: 0,
            score: 0,
            user: { name: '', class: '' },
            quizData: []
        };

        const screens = ['learning-screen', 'lobby-screen', 'quiz-screen', 'results-screen'];

        function showScreen(id) {
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function updateCard() {
            const word = vocabulary[state.currentIndex];
            document.getElementById('word-idx').innerText = (state.currentIndex + 1).toString().padStart(2, '0');
            document.getElementById('word-entry').innerText = word.word;
            document.getElementById('word-def').innerText = word.def;
            document.getElementById('word-syn').innerText = word.syn;
            document.getElementById('word-ant').innerText = word.ant;
            
            let exText = word.ex.replace(/\*(.*?)\*/g, `<span class="neon-text-cyan font-bold">$1</span>`);
            document.getElementById('word-ex').innerHTML = exText;

            document.getElementById('prev-btn').disabled = state.currentIndex === 0;
            document.getElementById('next-btn').innerText = state.currentIndex === 19 ? "Finish Gallery" : "Next Word";
        }

        function changeWord(dir) {
            if (dir === 1 && state.currentIndex === 19) {
                showScreen('lobby-screen');
                return;
            }
            state.currentIndex = Math.max(0, Math.min(19, state.currentIndex + dir));
            updateCard();
        }

        function playWordAudio() {
            const audio = document.getElementById('word-audio');
            audio.src = `${(state.currentIndex + 1).toString().padStart(2, '0')}.mp3`;
            audio.play().catch(() => console.log("Audio not found"));
        }

        function initQuiz() {
            const name = document.getElementById('user-name').value;
            const cls = document.getElementById('user-class').value;
            if (!name || !cls) return alert("PLAYER IDENTITY REQUIRED");

            state.user = { name, class: cls };
            generateQuiz();
            showScreen('quiz-screen');
            renderQuestion();
        }

        function generateQuiz() {
            state.quizData = vocabulary.map((item, idx) => {
                const types = ['definition', 'synonym', 'sentence'];
                const type = types[Math.floor(Math.random() * types.length)];
                let question = "";
                
                if (type === 'definition') question = `Which word is defined as: "${item.def}"?`;
                else if (type === 'synonym') question = `Select a word akin to: "${item.syn.split(',')[0]}"`;
                else question = `Complete: "${item.ex.replace(/\*(.*?)\*/g, "_______")}"`;

                let options = [item.word];
                while(options.length < 4) {
                    let rand = vocabulary[Math.floor(Math.random() * 20)].word;
                    if(!options.includes(rand)) options.push(rand);
                }
                return { question, options: options.sort(() => Math.random() - 0.5), correct: item.word };
            }).sort(() => Math.random() - 0.5);
        }

        function renderQuestion() {
            const q = state.quizData[state.quizIndex];
            document.getElementById('q-curr').innerText = state.quizIndex + 1;
            document.getElementById('q-score').innerText = state.score;
            document.getElementById('q-text').innerText = q.question;
            
            const container = document.getElementById('q-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerText = opt;
                div.onclick = () => checkAnswer(opt, div);
                container.appendChild(div);
            });
        }

        function checkAnswer(selected, element) {
            const correct = state.quizData[state.quizIndex].correct;
            const options = document.querySelectorAll('.option-card');
            options.forEach(o => o.style.pointerEvents = 'none');

            if (selected === correct) {
                state.score++;
                element.classList.add('correct-flash');
                document.getElementById('sfx-correct').play().catch(() => {});
            } else {
                element.classList.add('wrong-flash');
                document.getElementById('sfx-wrong').play().catch(() => {});
                options.forEach(o => {
                    if (o.innerText === correct) o.classList.add('correct-flash');
                });
            }

            setTimeout(() => {
                state.quizIndex++;
                if (state.quizIndex < 20) renderQuestion();
                else endMission();
            }, 1500);
        }

        function endMission() {
            showScreen('results-screen');
            const percent = (state.score / 20) * 100;
            document.getElementById('res-user').innerText = state.user.name;
            document.getElementById('res-class').innerText = `Unit 14 - Class ${state.user.class}`;
            document.getElementById('res-percent').innerText = percent + "%";
            
            setTimeout(() => {
                document.getElementById('res-bar').style.width = percent + "%";
            }, 500);

            const status = document.getElementById('res-status');
            const feedback = document.getElementById('res-feedback');
            
            if (percent >= 70) {
                status.innerText = "VICTORY";
                status.className = "orbitron text-6xl font-black mb-4 italic neon-text-lime";
                feedback.innerText = "Mission Accomplished. You have mastered the vocabulary protocols.";
                spawnConfetti();
            } else {
                status.innerText = "GAME OVER";
                status.className = "orbitron text-6xl font-black mb-4 italic neon-text-red";
                feedback.innerText = "Neural Sync Failed. You must re-initialize the learning cycle.";
                document.getElementById('retry-btn').classList.remove('hidden');
            }
        }

        function spawnConfetti() {
            const container = document.getElementById('results-screen');
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + "%";
                c.style.backgroundColor = ['#0ff', '#f0f', '#39ff14', '#faff00'][Math.floor(Math.random()*4)];
                c.style.animationDuration = (Math.random() * 2 + 2) + "s";
                c.style.animationDelay = (Math.random() * 1) + "s";
                container.appendChild(c);
            }
        }

        updateCard();
    </script>
</body>
</html>
